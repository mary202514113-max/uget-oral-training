<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 44音频测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-item { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; background: #4caf50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #388e3c; }
        .status { margin-top: 10px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    </style>
</head>
<body>
    <h1>Day 44音频文件测试</h1>
    
    <div class="test-item">
        <h3>测试1: 美式口音 Day 44</h3>
        <p>文件路径: <code>assets/audio/day-44-american.mp3</code></p>
        <button onclick="testAudio('assets/audio/day-44-american.mp3', 'test1-status')">播放美式口音</button>
        <div id="test1-status" class="status"></div>
    </div>
    
    <div class="test-item">
        <h3>测试2: 英式口音 Day 44</h3>
        <p>文件路径: <code>assets/audio/day-44-british.mp3</code></p>
        <button onclick="testAudio('assets/audio/day-44-british.mp3', 'test2-status')">播放英式口音</button>
        <div id="test2-status" class="status"></div>
    </div>
    
    <div class="test-item">
        <h3>测试3: 直接Audio对象测试</h3>
        <button onclick="testDirectAudio()">直接创建Audio对象测试</button>
        <div id="test3-status" class="status"></div>
    </div>
    
    <div class="test-item">
        <h3>测试4: 文件存在性验证</h3>
        <button onclick="checkFileExistence()">检查音频文件是否存在</button>
        <div id="test4-status" class="status"></div>
    </div>

    <script>
        async function testAudio(filePath, statusId) {
            const status = document.getElementById(statusId);
            status.className = 'status loading';
            status.textContent = '正在加载音频...';
            
            try {
                const audio = new Audio(filePath);
                audio.preload = 'auto';
                
                audio.oncanplaythrough = () => {
                    status.textContent = '音频已加载完成，可以播放';
                };
                
                audio.onplay = () => {
                    status.className = 'status success';
                    status.textContent = '音频正在播放中...';
                };
                
                audio.onended = () => {
                    status.textContent = '音频播放完成';
                };
                
                audio.onerror = (e) => {
                    console.error('音频错误:', e);
                    status.className = 'status error';
                    status.textContent = `音频加载失败: ${audio.error ? audio.error.code : '未知错误'}`;
                };
                
                // 尝试播放
                const playPromise = audio.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    await playPromise.catch(error => {
                        console.error('播放失败:', error);
                        status.className = 'status error';
                        status.textContent = `播放失败: ${error.message}`;
                    });
                } else {
                    await audio.play();
                }
                
            } catch (error) {
                console.error('测试出错:', error);
                status.className = 'status error';
                status.textContent = `测试出错: ${error.message}`;
            }
        }
        
        function testDirectAudio() {
            const status = document.getElementById('test3-status');
            status.className = 'status loading';
            status.textContent = '创建Audio对象测试...';
            
            try {
                // 模拟getLessonAudioSource函数的行为
                const dayCode = String(44).padStart(2, '0');
                const audioSource = `assets/audio/day-${dayCode}-american.mp3`;
                
                status.textContent = `生成的路径: ${audioSource}`;
                console.log('生成的音频路径:', audioSource);
                
                const audio = new Audio(audioSource);
                audio.preload = 'auto';
                
                audio.onerror = () => {
                    console.error('音频加载错误:', audio.error);
                    status.className = 'status error';
                    status.textContent = `音频加载失败，错误代码: ${audio.error?.code || '未知'}`;
                };
                
                audio.oncanplaythrough = () => {
                    console.log('音频可以播放');
                    status.className = 'status success';
                    status.textContent = 'Audio对象创建成功，可以播放';
                };
                
                audio.load();
                
            } catch (error) {
                console.error('创建Audio对象失败:', error);
                status.className = 'status error';
                status.textContent = `创建Audio对象失败: ${error.message}`;
            }
        }
        
        async function checkFileExistence() {
            const status = document.getElementById('test4-status');
            status.className = 'status loading';
            status.textContent = '检查文件是否存在...';
            
            try {
                const testFiles = [
                    'assets/audio/day-44-american.mp3',
                    'assets/audio/day-44-british.mp3',
                    'assets/audio/day-43-american.mp3',
                    'assets/audio/day-01-american.mp3'
                ];
                
                let results = [];
                for (const filePath of testFiles) {
                    try {
                        const response = await fetch(filePath, { method: 'HEAD' });
                        if (response.ok) {
                            results.push(`✅ ${filePath} - 存在 (${response.status})`);
                        } else {
                            results.push(`❌ ${filePath} - 不存在 (${response.status})`);
                        }
                    } catch (error) {
                        results.push(`❌ ${filePath} - 检查失败: ${error.message}`);
                    }
                }
                
                status.className = 'status success';
                status.innerHTML = '文件检查结果:<br>' + results.join('<br>');
                
            } catch (error) {
                console.error('文件检查失败:', error);
                status.className = 'status error';
                status.textContent = `文件检查失败: ${error.message}`;
            }
        }
        
        // 页面加载后自动检查
        window.addEventListener('load', () => {
            console.log('页面加载完成，开始自动检查...');
            checkFileExistence();
        });
    </script>
</body>
</html>
