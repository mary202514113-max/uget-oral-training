<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>诊断页面</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #fff; }
.box { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 16px; margin: 12px 0; }
.item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #0f3460; }
.label { color: #aaa; }
.value { font-weight: bold; color: #e94560; }
.ok { color: #4ecca3; }
.fail { color: #e94560; }
h2 { color: #4ecca3; margin-top: 0; }
</style>
</head>
<body>
<h2>页面诊断</h2>
<div class="box" id="results">检查中...</div>

<script>
// 直接从 training_app.html 读取 script 内容并执行诊断
const results = document.getElementById('results');

function add(label, value, ok) {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<span class="label">${label}</span><span class="${ok ? 'ok' : 'fail'}">${value}</span>`;
    results.appendChild(div);
}

fetch('training_app.html?t=' + Date.now())
    .then(r => r.text())
    .then(html => {
        add('training_app.html 大小', (html.length / 1024).toFixed(0) + ' KB', true);

        // 找 lessonsData
        const ldMatch = html.match(/lessonsData\s*=\s*\[([\s\S]*?)\]\s*;/);
        if (ldMatch) {
            const count = (ldMatch[0].match(/\bday:\s*\d+/g) || []).length;
            const maxDay = Math.max(...(ldMatch[0].match(/\bday:\s*(\d+)/g) || []).map(m => parseInt(m.match(/\d+/)[0])));
            add('lessonsData 课程数', count + ' 课', count === 67);
            add('最大 day', maxDay, maxDay === 67);
        } else {
            add('lessonsData', '未找到', false);
        }

        // 找 HTML 里的 total-days
        const tdMatch = html.match(/id="total-days">(\d+)</);
        if (tdMatch) {
            add('HTML 硬编码 total-days', tdMatch[1], false);
        }

        // 统计 script 块内的 day 值
        const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/);
        if (scriptMatch) {
            const days = [...new Set([...scriptMatch[1].matchAll(/\bday:\s*(\d+)/g)].map(m => parseInt(m[1])))];
            add('script 内 day 数量', days.length + ' 个不同值', days.length === 67);
            add('script 内最大 day', Math.max(...days), Math.max(...days) === 67);
        }

        add('诊断完成', '请截图发给我', true);
    })
    .catch(err => {
        add('错误', err.message, false);
    });
</script>
</body>
</html>
